<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>재고 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5a0;
      --warn: #ff6b35;
      --danger: #ff3b5c;
      --text: #f0f0f5;
      --text2: #888899;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      height: 100%; overflow: hidden; overscroll-behavior: none;
    }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

```
/* HEADER */
.header { padding: calc(var(--safe-top) + 16px) 20px 12px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.app-title { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; user-select: none; -webkit-user-select: none; }
.app-title span { color: var(--text2); font-weight: 400; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: background .15s, transform .1s;
  user-select: none; -webkit-user-select: none;
}
.icon-btn:active { transform: scale(.92); background: var(--surface); }
.search-bar { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0 12px; gap: 8px; }
.search-bar svg { color: var(--text2); flex-shrink: 0; }
.search-bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: 'Noto Sans KR', sans-serif; padding: 10px 0; }
.search-bar input::placeholder { color: var(--text2); }

/* TABS */
.tabs { display: flex; padding: 10px 20px 4px; gap: 6px; overflow-x: auto; scrollbar-width: none; user-select: none; -webkit-user-select: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: transparent; transition: all .15s; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

/* FILTER */
.filter-row { display: flex; gap: 8px; padding: 8px 20px 0; overflow-x: auto; scrollbar-width: none; user-select: none; -webkit-user-select: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: transparent; flex-shrink: 0; transition: all .15s; user-select: none; -webkit-user-select: none; }
.filter-chip.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,.2); }

/* STATS */
.stats-bar { display: flex; gap: 8px; padding: 12px 20px 0; }
.stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; user-select: none; -webkit-user-select: none; }
.stat-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
.stat-value.green { color: var(--accent); }
.stat-value.orange { color: var(--warn); }
.stat-value.red { color: var(--danger); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 12px 20px calc(var(--safe-bottom) + 90px); overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }

/* ITEM CARD */
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; position: relative; overflow: hidden; transition: transform .15s, background .15s; cursor: pointer; user-select: none; -webkit-user-select: none; }
.item-card:active { transform: scale(.98); background: var(--surface2); }
.item-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }
.item-card.low::before { background: var(--warn); }
.item-card.out::before { background: var(--danger); }
.item-emoji { width: 44px; height: 44px; background: var(--surface2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.item-meta { font-size: 12px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
.category-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,.07); color: var(--text2); }
.item-qty-area { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.qty-display { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
.qty-display.green { color: var(--accent); }
.qty-display.orange { color: var(--warn); }
.qty-display.red { color: var(--danger); }
.qty-unit { font-size: 11px; color: var(--text2); text-align: right; }
.qty-controls { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .1s, transform .1s; font-family: monospace; user-select: none; -webkit-user-select: none; }
.qty-btn:active { transform: scale(.88); }
.qty-btn.plus { border-color: var(--accent); color: var(--accent); }
.qty-btn.minus { border-color: rgba(255,59,92,.4); color: var(--danger); }

/* EMPTY */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text2); text-align: center; gap: 12px; }
.empty-state .emoji { font-size: 48px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* FAB */
.fab { position: fixed; bottom: calc(var(--safe-bottom) + 24px); left: 50%; transform: translateX(-50%); width: min(calc(100% - 40px), 440px); background: var(--accent); color: #000; border: none; border-radius: 16px; padding: 16px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 32px rgba(0,229,160,.3); transition: transform .15s, box-shadow .15s; z-index: 50; user-select: none; -webkit-user-select: none; }
.fab:active { transform: translateX(-50%) scale(.97); box-shadow: 0 4px 16px rgba(0,229,160,.2); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px 20px calc(var(--safe-bottom) + 24px); transform: translateY(100%); transition: transform .3s cubic-bezier(.34,1.56,.64,1); max-height: 92dvh; overflow-y: auto; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; user-select: none; -webkit-user-select: none; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* FORM */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: block; user-select: none; -webkit-user-select: none; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 15px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color .15s; -webkit-appearance: none; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text2); }

/* EMOJI PICKER — user-select:none 핵심 수정 */
.emoji-picker { display: grid; grid-template-columns: repeat(8,1fr); gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
.emoji-opt { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 8px; cursor: pointer; transition: background .1s, transform .1s; user-select: none; -webkit-user-select: none; touch-action: manipulation; -webkit-touch-callout: none; }
.emoji-opt:active { transform: scale(.85); }
.emoji-opt.selected { background: var(--accent); }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: transform .1s, opacity .1s; user-select: none; -webkit-user-select: none; }
.btn:active { transform: scale(.97); opacity: .9; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(255,59,92,.15); color: var(--danger); border: 1px solid rgba(255,59,92,.3); }

/* DETAIL */
.detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.detail-emoji { width: 60px; height: 60px; background: var(--surface2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.detail-info { flex: 1; }
.detail-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.detail-cat { font-size: 13px; color: var(--text2); }
.detail-qty-card { background: var(--surface2); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.detail-qty-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.detail-qty-num { font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 700; }
.detail-qty-controls { display: flex; flex-direction: column; gap: 8px; }
.detail-qty-btn { width: 44px; height: 44px; border-radius: 12px; border: none; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; font-family: monospace; user-select: none; -webkit-user-select: none; }
.detail-qty-btn:active { transform: scale(.88); }
.detail-qty-btn.plus { background: rgba(0,229,160,.15); color: var(--accent); }
.detail-qty-btn.minus { background: rgba(255,59,92,.15); color: var(--danger); }
.detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.detail-meta-item { background: var(--surface2); border-radius: 12px; padding: 12px; }
.detail-meta-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.detail-meta-val { font-size: 15px; font-weight: 600; }

/* HISTORY */
.hist-summary { display: flex; gap: 8px; margin-bottom: 14px; }
.hist-summary-card { flex: 1; background: var(--surface2); border-radius: 10px; padding: 10px; text-align: center; }
.hist-summary-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.hist-summary-val { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }

.detail-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--surface2); border-radius: 12px; padding: 4px; user-select: none; -webkit-user-select: none; }
.detail-tab { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; color: var(--text2); transition: all .15s; user-select: none; -webkit-user-select: none; }
.detail-tab.active { background: var(--surface); color: var(--text); }
.detail-tab.t-in.active { color: var(--accent); }
.detail-tab.t-out.active { color: var(--danger); }

.hist-date-group { margin-bottom: 16px; }
.hist-date-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.hist-date-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 10px; margin-bottom: 6px; font-size: 13px; }
.hist-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.hist-icon.pos { background: rgba(0,229,160,.12); color: var(--accent); }
.hist-icon.neg { background: rgba(255,59,92,.12); color: var(--danger); }
.hist-main { flex: 1; min-width: 0; }
.hist-delta { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
.hist-delta.pos { color: var(--accent); }
.hist-delta.neg { color: var(--danger); }
.hist-sub { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-time-col { text-align: right; flex-shrink: 0; }
.hist-time { font-size: 11px; color: var(--text2); white-space: nowrap; }
.hist-date-small { font-size: 10px; color: var(--text2); opacity: .7; }
.history-empty { text-align: center; color: var(--text2); font-size: 13px; padding: 24px 0; }

/* SORT */
.sort-opt { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); margin-bottom: 8px; cursor: pointer; font-size: 15px; font-weight: 500; user-select: none; -webkit-user-select: none; transition: background .1s; }
.sort-opt.active { border-color: var(--accent); color: var(--accent); }
.sort-opt:active { background: var(--surface); }

/* TOAST */
.toast { position: fixed; top: calc(var(--safe-top) + 80px); left: 50%; transform: translateX(-50%) translateY(-16px); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; font-weight: 500; white-space: nowrap; z-index: 999; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">STOCK<span>/mgr</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openSortModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button class="icon-btn" onclick="exportCSV()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

<script>
const EMOJIS = ['📦','🛒','🍎','🥩','🧃','🥛','🫙','🧴','🧹','🔧','💊','📝','👕','👟','💻','📱','🎮','🏷️','🍺','☕','🍰','🌿','🧊','🔌','🪴','🧰','💡','🪣'];

let items = JSON.parse(localStorage.getItem('stockItems') || '[]');
let currentTab = 'all', currentFilter = 'all', sortBy = 'name';
let selectedEmoji = '📦', editingId = null;
let detailHistTab = 'all', currentDetailId = null;

const save = () => localStorage.setItem('stockItems', JSON.stringify(items));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fNum = n => (n||0).toLocaleString('ko-KR');

function fDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function fTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h<12?'오전':'오후'} ${h%12||12}:${m}`;
}
function fDateLabel(ts) {
  const today = new Date(), yest = new Date(today);
  yest.setDate(today.getDate()-1);
  if (fDate(ts)===fDate(today)) return '오늘';
  if (fDate(ts)===fDate(yest)) return '어제';
  const d = new Date(ts);
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}
function timeAgo(ts) {
  const d = Date.now()-ts;
  if (d<60000) return '방금';
  if (d<3600000) return Math.floor(d/60000)+'분 전';
  if (d<86400000) return Math.floor(d/3600000)+'시간 전';
  return Math.floor(d/86400000)+'일 전';
}

/* ── TABS / FILTER ── */
const getCats = () => [...new Set(items.map(i=>i.category).filter(Boolean))];
function renderTabs() {
  document.getElementById('tabsRow').innerHTML =
    `<button class="tab ${currentTab==='all'?'active':''}" onclick="setTab('all')">전체</button>`
    + getCats().map(c=>`<button class="tab ${currentTab===c?'active':''}" onclick="setTab(${JSON.stringify(c)})">${c}</button>`).join('');
}
function setTab(t) { currentTab=t; renderItems(); }
function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderItems();
}

/* ── STATS ── */
function renderStats() {
  const list = getFiltered();
  const low = list.filter(i=>i.qty>0&&i.qty<=(i.minQty||0)).length;
  const out = list.filter(i=>i.qty<=0).length;
  const val = list.reduce((s,i)=>s+(i.qty*(i.price||0)),0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">상품 수</div><div class="stat-value green">${list.length}</div></div>
    <div class="stat-card"><div class="stat-label">부족 경고</div><div class="stat-value orange">${low}</div></div>
    <div class="stat-card"><div class="stat-label">품절</div><div class="stat-value red">${out}</div></div>
    <div class="stat-card"><div class="stat-label">재고 총액</div><div class="stat-value" style="font-size:12px;color:var(--accent)">₩${fNum(val)}</div></div>`;
}

/* ── FILTER/SORT ── */
function getFiltered() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  return items.filter(i=>{
    if (currentTab!=='all'&&i.category!==currentTab) return false;
    if (q&&!i.name.toLowerCase().includes(q)) return false;
    if (currentFilter==='low'&&!(i.qty>0&&i.qty<=(i.minQty||0))) return false;
    if (currentFilter==='out'&&i.qty>0) return false;
    return true;
  }).sort((a,b)=>{
    if (sortBy==='name') return a.name.localeCompare(b.name,'ko');
    if (sortBy==='qty_asc') return a.qty-b.qty;
    if (sortBy==='qty_desc') return b.qty-a.qty;
    if (sortBy==='updated') return (b.updatedAt||0)-(a.updatedAt||0);
    return 0;
  });
}

/* ── RENDER LIST ── */
function renderItems() {
  renderTabs(); renderStats();
  const dl = document.getElementById('catList');
  if (dl) dl.innerHTML = getCats().map(c=>`<option value="${c}">`).join('');
  const list = getFiltered();
  const el = document.getElementById('content');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>상품이 없습니다.<br/>+ 버튼으로 추가해보세요.</p></div>`;
    return;
  }
  el.innerHTML = list.map(item=>{
    const s = item.qty<=0?'out':item.qty<=(item.minQty||0)?'low':'';
    const qc = item.qty<=0?'red':item.qty<=(item.minQty||0)?'orange':'green';
    return `
    <div class="item-card ${s}" onclick="openDetail('${item.id}')">
      <div class="item-emoji">${item.emoji||'📦'}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          ${item.category?`<span class="category-badge">${item.category}</span>`:''}
          ${item.location?`<span>📍${item.location}</span>`:''}
          ${item.price?`<span>₩${fNum(item.price)}</span>`:''}
        </div>
      </div>
      <div class="item-qty-area">
        <div class="qty-display ${qc}">${item.qty}</div>
        <div class="qty-unit">${item.unit||'개'}</div>
        <div class="qty-controls" onclick="event.stopPropagation()">
          <button class="qty-btn minus" onclick="adjQty('${item.id}',-1)">−</button>
          <button class="qty-btn plus" onclick="adjQty('${item.id}',1)">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── ADJUST QTY ── */
function adjQty(id, delta) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const prev = item.qty;
  item.qty = Math.max(0, item.qty+delta);
  if (item.qty!==prev) {
    if (!item.history) item.history=[];
    item.history.unshift({delta, result:item.qty, ts:Date.now(), memo:''});
    if (item.history.length>200) item.history.pop();
    item.updatedAt = Date.now();
    save(); renderItems();
    if (item.qty===0) showToast(`⚠️ ${item.name} 품절!`);
    else if (item.minQty&&item.qty===item.minQty) showToast(`⚠️ ${item.name} 재고 부족`);
  }
}

/* ── ADD/EDIT MODAL ── */
function openAddModal(id) {
  editingId = id||null;
  document.getElementById('addModalTitle').textContent = id?'상품 수정':'새 상품 추가';
  selectedEmoji = '📦';
  if (id) {
    const item = items.find(i=>i.id===id);
    if (item) {
      selectedEmoji = item.emoji||'📦';
      document.getElementById('formName').value = item.name;
      document.getElementById('formCategory').value = item.category||'';
      document.getElementById('formUnit').value = item.unit||'';
      document.getElementById('formQty').value = item.qty;
      document.getElementById('formMin').value = item.minQty||0;
      document.getElementById('formPrice').value = item.price||'';
      document.getElementById('formLocation').value = item.location||'';
      document.getElementById('formNote').value = item.note||'';
    }
  } else {
    ['formName','formCategory','formUnit','formQty','formMin','formPrice','formLocation','formNote']
      .forEach(fid=>{ document.getElementById(fid).value=''; });
  }
  buildEmojiPicker();
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('formName').focus(),350);
}

function buildEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e=>
    `<div class="emoji-opt${e===selectedEmoji?' selected':''}" ontouchend="pickEmoji('${e}');event.preventDefault()" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}
function pickEmoji(e) { selectedEmoji=e; buildEmojiPicker(); }

function saveItem() {
  const name = document.getElementById('formName').value.trim();
  if (!name) { showToast('상품명을 입력해주세요'); return; }
  const data = {
    emoji:selectedEmoji, name,
    category:document.getElementById('formCategory').value.trim(),
    unit:document.getElementById('formUnit').value.trim()||'개',
    qty:parseInt(document.getElementById('formQty').value)||0,
    minQty:parseInt(document.getElementById('formMin').value)||0,
    price:parseInt(document.getElementById('formPrice').value)||0,
    location:document.getElementById('formLocation').value.trim(),
    note:document.getElementById('formNote').value.trim(),
    updatedAt:Date.now(),
  };
  if (editingId) {
    const idx = items.findIndex(i=>i.id===editingId);
    if (idx!==-1) items[idx]={...items[idx],...data};
    showToast('✅ 수정되었습니다');
  } else {
    items.push({id:uid(),history:[],createdAt:Date.now(),...data});
    showToast('✅ 추가되었습니다');
  }
  save(); closeModal('addModal'); renderItems();
}

/* ── DETAIL MODAL ── */
function openDetail(id) {
  currentDetailId=id; detailHistTab='all';
  renderDetail(id);
  document.getElementById('detailModal').classList.add('open');
}

function renderDetail(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const sc = item.qty<=0?'red':item.qty<=(item.minQty||0)?'orange':'green';
  const hist = item.history||[];

  // 필터
  const filtered = detailHistTab==='in' ? hist.filter(h=>h.delta>0)
                 : detailHistTab==='out' ? hist.filter(h=>h.delta<0)
                 : hist;

  // 날짜별 그룹
  const groups = {};
  filtered.forEach(h=>{
    const dk = fDate(h.ts);
    if (!groups[dk]) groups[dk]={label:fDateLabel(h.ts), rows:[], ts:h.ts};
    groups[dk].rows.push(h);
  });

  // 집계
  const totalIn = hist.filter(h=>h.delta>0).reduce((s,h)=>s+h.delta,0);
  const totalOut = hist.filter(h=>h.delta<0).reduce((s,h)=>s+Math.abs(h.delta),0);

  const histBody = Object.values(groups).length===0
    ? `<div class="history-empty">기록이 없습니다</div>`
    : Object.values(groups).map(g=>`
        <div class="hist-date-group">
          <div class="hist-date-label">${g.label}</div>
          ${g.rows.map(h=>`
            <div class="hist-row">
              <div class="hist-icon ${h.delta>0?'pos':'neg'}">${h.delta>0?'▲':'▼'}</div>
              <div class="hist-main">
                <div class="hist-delta ${h.delta>0?'pos':'neg'}">${h.delta>0?'+':''}${h.delta} ${item.unit||'개'}</div>
                <div class="hist-sub">재고 ${h.result}${item.unit||'개'}${h.memo?' · '+h.memo:''}</div>
              </div>
              <div class="hist-time-col">
                <div class="hist-time">${fTime(h.ts)}</div>
              </div>
            </div>`).join('')}
        </div>`).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="modal-handle"></div>
    <div class="detail-header">
      <div class="detail-emoji">${item.emoji||'📦'}</div>
      <div class="detail-info">
        <div class="detail-name">${item.name}</div>
        <div class="detail-cat">${item.category||'미분류'}${item.location?' · '+item.location:''}</div>
      </div>
    </div>

    <div class="detail-qty-card">
      <div>
        <div class="detail-qty-label">현재 재고</div>
        <div class="detail-qty-num" style="color:var(--${sc})">${item.qty}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${item.unit||'개'} · 최소 ${item.minQty||0}${item.unit||'개'}</div>
      </div>
      <div class="detail-qty-controls">
        <button class="detail-qty-btn plus" onclick="adjQtyRefresh('${id}',1)">＋</button>
        <button class="detail-qty-btn minus" onclick="adjQtyRefresh('${id}',-1)">−</button>
      </div>
    </div>

    <div class="detail-meta-grid">
      <div class="detail-meta-item">
        <div class="detail-meta-label">단가</div>
        <div class="detail-meta-val">${item.price?'₩'+fNum(item.price):'—'}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">재고 총액</div>
        <div class="detail-meta-val" style="color:var(--accent)">${item.price?'₩'+fNum(item.qty*item.price):'—'}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">최근 변경</div>
        <div class="detail-meta-val" style="font-size:13px">${item.updatedAt?timeAgo(item.updatedAt):'—'}</div>
      </div>
      <div class="detail-meta-item">
        <div class="detail-meta-label">메모</div>
        <div class="detail-meta-val" style="font-size:13px">${item.note||'—'}</div>
      </div>
    </div>

    <div class="hist-summary">
      <div class="hist-summary-card">
        <div class="hist-summary-label">총 입고</div>
        <div class="hist-summary-val" style="color:var(--accent)">+${totalIn}</div>
      </div>
      <div class="hist-summary-card">
        <div class="hist-summary-label">총 출고</div>
        <div class="hist-summary-val" style="color:var(--danger)">-${totalOut}</div>
      </div>
      <div class="hist-summary-card">
        <div class="hist-summary-label">기록 건수</div>
        <div class="hist-summary-val">${hist.length}</div>
      </div>
    </div>

    <div class="detail-tabs">
      <div class="detail-tab ${detailHistTab==='all'?'active':''}" onclick="switchHist('${id}','all')">전체 이력</div>
      <div class="detail-tab t-in ${detailHistTab==='in'?'active':''}" onclick="switchHist('${id}','in')">📈 입고</div>
      <div class="detail-tab t-out ${detailHistTab==='out'?'active':''}" onclick="switchHist('${id}','out')">📉 출고</div>
    </div>
    <div>${histBody}</div>

    <div class="btn-row" style="margin-top:20px">
      <button class="btn btn-danger" onclick="deleteItem('${id}')">삭제</button>
      <button class="btn btn-secondary" onclick="closeModal('detailModal');openAddModal('${id}')">수정</button>
      <button class="btn btn-primary" onclick="closeModal('detailModal')">닫기</button>
    </div>`;
}

function switchHist(id, tab) { detailHistTab=tab; renderDetail(id); }
function adjQtyRefresh(id, delta) { adjQty(id,delta); renderDetail(id); }

function deleteItem(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  items=items.filter(i=>i.id!==id);
  save(); closeModal('detailModal'); renderItems();
  showToast('🗑️ 삭제되었습니다');
}

/* ── SORT ── */
function openSortModal() {
  const opts = [{key:'name',label:'이름순'},{key:'qty_asc',label:'수량 적은 순'},{key:'qty_desc',label:'수량 많은 순'},{key:'updated',label:'최근 수정순'}];
  document.getElementById('sortOptions').innerHTML = opts.map(o=>`
    <div class="sort-opt ${sortBy===o.key?'active':''}" onclick="setSort('${o.key}')">
      ${o.label} ${sortBy===o.key?'<span>✓</span>':''}
    </div>`).join('');
  document.getElementById('sortModal').classList.add('open');
}
function setSort(k) { sortBy=k; closeModal('sortModal'); renderItems(); }

/* ── CSV ── */
function exportCSV() {
  const rows = [['상품명','카테고리','수량','단위','최소수량','단가','위치','메모'],
    ...items.map(i=>[i.name,i.category||'',i.qty,i.unit||'개',i.minQty||0,i.price||0,i.location||'',i.note||''])];
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download = `재고관리_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('📥 CSV 내보내기 완료');
}

/* ── HELPERS ── */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlayClick(e,id) { if (e.target.classList.contains('modal-overlay')) closeModal(id); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
