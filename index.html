  <script>
    // Service Worker 등록 — 업데이트 자동 감지
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // 새 버전 감지되면 즉시 활성화
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // 새 버전 있음 → SW에 skipWaiting 요청
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
      // SW가 교체되면 페이지 자동 새로고침
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; location.reload(); }
      });
    }
  </script>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* ── HEADER ── */
.hdr { padding: calc(var(--st) + 16px) 20px 12px; border-bottom: 1px solid var(--border); }
.hdr-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); user-select: none; }
.logo span { color: var(--text2); font-weight: 400; }
.hdr-btns { display: flex; gap: 8px; }

/* ── ICON BUTTON ── */
.ibtn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  /* 터치 이벤트 명확히 허용 */
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
}
.ibtn:active { opacity: .7; }

/* ── SEARCH ── */
.srch { display: flex; align-items: center; background: var(--surf2); border: 1px solid var(--border); border-radius: 12px; padding: 0 12px; gap: 8px; }
.srch svg { color: var(--text2); flex-shrink: 0; }
.srch input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: 'Noto Sans KR', sans-serif; padding: 10px 0; }
.srch input::placeholder { color: var(--text2); }

/* ── TABS ── */
.tabs { display: flex; padding: 10px 20px 4px; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-user-select: none; user-select: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; border: 1px solid var(--border); color: var(--text2); background: transparent; touch-action: manipulation; cursor: pointer; flex-shrink: 0; }
.tab.on { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

/* ── FILTER CHIPS ── */
.chips { display: flex; gap: 8px; padding: 8px 20px 0; overflow-x: auto; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid var(--border); color: var(--text2); background: transparent; flex-shrink: 0; touch-action: manipulation; cursor: pointer; -webkit-user-select: none; user-select: none; }
.chip.on { background: var(--surf2); color: var(--text); border-color: rgba(255,255,255,.2); }

/* ── STATS ── */
.stats { display: flex; gap: 8px; padding: 12px 20px 0; }
.sc { flex: 1; background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; }
.sc-lbl { font-size: 10px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.sc-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
.c-green { color: var(--accent); }
.c-orange { color: var(--warn); }
.c-red { color: var(--danger); }

/* ── SCROLL AREA ── */
.scroll { flex: 1; overflow-y: auto; padding: 12px 20px; padding-bottom: calc(var(--sb) + 90px); overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }

/* ── ITEM CARD ── */
.card { background: var(--surf); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; position: relative; overflow: hidden; touch-action: manipulation; cursor: pointer; -webkit-user-select: none; user-select: none; }
.card:active { opacity: .8; }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }
.card.low::before { background: var(--warn); }
.card.out::before { background: var(--danger); }

.c-ico { width: 44px; height: 44px; background: var(--surf2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.c-inf { flex: 1; min-width: 0; }
.c-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.c-meta { font-size: 12px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,.07); }

.c-qty { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.qty-num { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
.qty-unit { font-size: 11px; color: var(--text2); }
.qty-ctrl { display: flex; gap: 6px; }

/* ── +/- BUTTONS (카드 위) ── */
.qbtn {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surf2); color: var(--text);
  font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.qbtn:active { opacity: .6; }
.qbtn.p { border-color: var(--accent); color: var(--accent); }
.qbtn.m { border-color: rgba(255,59,92,.4); color: var(--danger); }

/* ── EMPTY ── */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text2); text-align: center; gap: 12px; }
.empty .ei { font-size: 48px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(var(--sb) + 24px); left: 50%; transform: translateX(-50%);
  width: min(calc(100% - 40px), 440px);
  background: var(--accent); color: #000; border: none; border-radius: 16px;
  padding: 16px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 8px 32px rgba(0,229,160,.3);
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
  z-index: 10; /* 낮게 유지 — 모달 overlay보다 낮아야 함 */
}
.fab:active { opacity: .85; }

/* ── MODAL OVERLAY ──
   핵심: display:none ↔ display:flex 으로 전환.
   opacity 방식은 pointer-events 버그 위험이 있음. ── */
.overlay {
  display: none;               /* 기본: 완전히 숨김 → 터치 차단 없음 */
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 500;
  align-items: flex-end;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }  /* 열릴 때만 보임 */

/* ── MODAL SHEET ── */
.sheet {
  background: var(--surf); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 20px 20px calc(var(--sb) + 24px);
  max-height: 92dvh; overflow-y: auto;
  animation: slideUp .28s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* ── FORM ── */
.fg { margin-bottom: 14px; }
.flbl { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: block; -webkit-user-select: none; user-select: none; }
.fi {
  width: 100%; background: var(--surf2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; font-size: 15px; color: var(--text);
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  -webkit-appearance: none; transition: border-color .15s;
}
.fi:focus { border-color: var(--accent); }
.fi::placeholder { color: var(--text2); }
.frow { display: flex; gap: 10px; }
.frow .fg { flex: 1; }

/* ── EMOJI PICKER ── */
.epick {
  display: grid; grid-template-columns: repeat(8,1fr); gap: 6px;
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px;
  /* 텍스트 선택 메뉴 완전 차단 */
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}
.eopt {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border-radius: 8px;
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
}
.eopt:active { transform: scale(.82); }
.eopt.on { background: var(--accent); }

/* ── BUTTONS ── */
.brow { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1; padding: 14px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.btn:active { opacity: .8; }
.btn-ok  { background: var(--accent); color: #000; }
.btn-sec { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }
.btn-del { background: rgba(255,59,92,.12); color: var(--danger); border: 1px solid rgba(255,59,92,.3); }

/* ── DETAIL ── */
.dh { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.dh-ico { width: 60px; height: 60px; background: var(--surf2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.dh-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.dh-cat { font-size: 13px; color: var(--text2); }

.dqc { background: var(--surf2); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.dq-lbl { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.dq-num { font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 700; }
.dq-ctrl { display: flex; flex-direction: column; gap: 8px; }
.dqbtn {
  width: 44px; height: 44px; border-radius: 12px; border: none;
  font-size: 22px; line-height: 1; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.dqbtn:active { opacity: .65; }
.dqbtn.p { background: rgba(0,229,160,.14); color: var(--accent); }
.dqbtn.m { background: rgba(255,59,92,.14); color: var(--danger); }

.dmg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dmi { background: var(--surf2); border-radius: 12px; padding: 12px; }
.dmi-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.dmi-val { font-size: 15px; font-weight: 600; }

/* ── HISTORY ── */
.hsum { display: flex; gap: 8px; margin-bottom: 14px; }
.hsc { flex: 1; background: var(--surf2); border-radius: 10px; padding: 10px; text-align: center; }
.hsc-lbl { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.hsc-val { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }

.htabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--surf2); border-radius: 12px; padding: 4px; -webkit-user-select: none; user-select: none; }
.htab {
  flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 600;
  text-align: center; color: var(--text2);
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.htab.on { background: var(--surf); color: var(--text); }
.htab.on.hin { color: var(--accent); }
.htab.on.hout { color: var(--danger); }

.hgrp { margin-bottom: 16px; }
.hdate { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .6px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
.hdate::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.hrow { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surf2); border-radius: 10px; margin-bottom: 6px; font-size: 13px; }
.hico { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.hico.pos { background: rgba(0,229,160,.12); color: var(--accent); }
.hico.neg { background: rgba(255,59,92,.12); color: var(--danger); }
.hmain { flex: 1; min-width: 0; }
.hdelta { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
.hdelta.pos { color: var(--accent); }
.hdelta.neg { color: var(--danger); }
.hsub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.htime { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.hempty { text-align: center; color: var(--text2); font-size: 13px; padding: 24px 0; }

/* ── SORT OPTS ── */
.sopt {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surf2); margin-bottom: 8px;
  font-size: 15px; font-weight: 500;
  touch-action: manipulation; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.sopt:active { opacity: .7; }
.sopt.on { border-color: var(--accent); color: var(--accent); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--sb) + 110px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 20px;
  font-size: 13px; font-weight: 500; white-space: nowrap;
  z-index: 9999; opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

   STATE
════════════════════════════════════════════ */
const EMOJIS = ['📦','🛒','🍎','🥩','🧃','🥛','🫙','🧴','🧹','🔧','💊','📝','👕','👟','💻','📱','🎮','🏷️','🍺','☕','🍰','🌿','🧊','🔌','🪴','🧰','💡','🪣'];

/* ── localStorage 키 — 절대 바꾸지 말 것 ── */
const STORE_KEY = 'stockmgr_data';

/* ── 이전 버전 키에서 마이그레이션 (데이터 유실 방지) ── */
(function migrate() {
  if (localStorage.getItem(STORE_KEY)) return; // 이미 새 키에 데이터 있으면 패스

  // 이전에 쓰던 키들을 순서대로 확인
  const oldKeys = ['si2', 'stockItems'];
  for (const k of oldKeys) {
    const raw = localStorage.getItem(k);
    if (raw && raw !== '[]') {
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data) && data.length > 0) {
          localStorage.setItem(STORE_KEY, raw); // 새 키로 복사
          localStorage.removeItem(k);           // 구 키 삭제
          console.log(`[migrate] ${k} → ${STORE_KEY} (${data.length}건)`);
          return;
        }
      } catch(e) {}
    }
  }
})();

let DB    = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let tab   = 'all';
let chip  = 'all';
let order = 'name';
let selE  = '📦';
let editId= null;
let dTab  = 'all'; // detail hist tab

const persist = () => localStorage.setItem(STORE_KEY, JSON.stringify(DB));
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fN      = n  => (n||0).toLocaleString('ko-KR');

/* ════════════════════════════════════════════
   DATE HELPERS
════════════════════════════════════════════ */
function fDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}
function fTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = pad(d.getMinutes());
  return `${h<12?'오전':'오후'} ${h%12||12}:${m}`;
}
function fLabel(ts) {
  const t = new Date(ts), now = new Date();
  const y = new Date(now); y.setDate(now.getDate()-1);
  if (fDate(ts)===fDate(now)) return '오늘';
  if (fDate(ts)===fDate(y))   return '어제';
  return `${t.getMonth()+1}월 ${t.getDate()}일`;
}
function tAgo(ts) {
  const d = Date.now()-ts;
  if (d<60000) return '방금';
  if (d<3600000) return `${Math.floor(d/60000)}분 전`;
  if (d<86400000) return `${Math.floor(d/3600000)}시간 전`;
  return `${Math.floor(d/86400000)}일 전`;
}
const pad = n => String(n).padStart(2,'0');

/* ════════════════════════════════════════════
   TABS / CHIPS
════════════════════════════════════════════ */
const getCats = () => [...new Set(DB.map(i=>i.cat).filter(Boolean))];

function renderTabs() {
  const cats = getCats();
  document.getElementById('tabRow').innerHTML =
    `<button class="tab ${tab==='all'?'on':''}" onclick="setTab('all')">전체</button>`
    + cats.map(c=>`<button class="tab ${tab===c?'on':''}" onclick="setTab(${JSON.stringify(c)})">${c}</button>`).join('');
}

function setTab(t) { tab=t; render(); }

function setChip(c, el) {
  chip = c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  render();
}

/* ════════════════════════════════════════════
   STATS
════════════════════════════════════════════ */
function renderStats() {
  const list = getList();
  const low  = list.filter(i=>i.qty>0 && i.qty<=(i.min||0)).length;
  const out  = list.filter(i=>i.qty<=0).length;
  const val  = list.reduce((s,i)=>s+(i.qty*(i.price||0)), 0);
  document.getElementById('statRow').innerHTML = `
    <div class="sc"><div class="sc-lbl">상품 수</div><div class="sc-val c-green">${list.length}</div></div>
    <div class="sc"><div class="sc-lbl">부족 경고</div><div class="sc-val c-orange">${low}</div></div>
    <div class="sc"><div class="sc-lbl">품절</div><div class="sc-val c-red">${out}</div></div>
    <div class="sc"><div class="sc-lbl">재고 총액</div><div class="sc-val" style="font-size:12px;color:var(--accent)">₩${fN(val)}</div></div>`;
}

/* ════════════════════════════════════════════
   LIST
════════════════════════════════════════════ */
function getList() {
  const q = (document.getElementById('sq')?.value||'').toLowerCase();
  return DB.filter(i=>{
    if (tab!=='all' && i.cat!==tab) return false;
    if (q && !i.name.toLowerCase().includes(q)) return false;
    if (chip==='low' && !(i.qty>0 && i.qty<=(i.min||0))) return false;
    if (chip==='out' && i.qty>0) return false;
    return true;
  }).sort((a,b)=>{
    if (order==='name')     return a.name.localeCompare(b.name,'ko');
    if (order==='qty_asc')  return a.qty-b.qty;
    if (order==='qty_desc') return b.qty-a.qty;
    if (order==='updated')  return (b.upd||0)-(a.upd||0);
    return 0;
  });
}

function render() {
  renderTabs(); renderStats();
  // datalist
  const dl = document.getElementById('catDL');
  if (dl) dl.innerHTML = getCats().map(c=>`<option value="${c}">`).join('');

  const list = getList();
  const el   = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📭</div><p>상품이 없습니다.<br/>아래 버튼으로 추가해보세요.</p></div>`;
    return;
  }
  el.innerHTML = list.map(item=>{
    const s  = item.qty<=0?'out': item.qty<=(item.min||0)?'low':'';
    const qc = item.qty<=0?'c-red': item.qty<=(item.min||0)?'c-orange':'c-green';
    return `
<div class="card ${s}" onclick="openDet('${item.id}')">
  <div class="c-ico">${item.emoji||'📦'}</div>
  <div class="c-inf">
    <div class="c-name">${item.name}</div>
    <div class="c-meta">
      ${item.cat?`<span class="badge">${item.cat}</span>`:''}
      ${item.loc?`<span>📍${item.loc}</span>`:''}
      ${item.price?`<span>₩${fN(item.price)}</span>`:''}
    </div>
  </div>
  <div class="c-qty">
    <div class="qty-num ${qc}">${item.qty}</div>
    <div class="qty-unit">${item.unit||'개'}</div>
    <div class="qty-ctrl" onclick="event.stopPropagation()">
      <button class="qbtn m" onclick="adj('${item.id}',-1)">−</button>
      <button class="qbtn p" onclick="adj('${item.id}',+1)">＋</button>
    </div>
  </div>
</div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   ADJUST QTY
════════════════════════════════════════════ */
function adj(id, delta) {
  const item = DB.find(i=>i.id===id);
  if (!item) return;
  const prev = item.qty;
  item.qty = Math.max(0, item.qty+delta);
  if (item.qty!==prev) {
    if (!item.hist) item.hist=[];
    item.hist.unshift({d:delta, r:item.qty, ts:Date.now(), m:''});
    if (item.hist.length>200) item.hist.pop();
    item.upd = Date.now();
    persist(); render();
    if (item.qty===0) toast(`⚠️ ${item.name} 품절!`);
    else if (item.min && item.qty===item.min) toast(`⚠️ ${item.name} 재고 부족`);
  }
}

/* ════════════════════════════════════════════
   ADD / EDIT MODAL
════════════════════════════════════════════ */
function openAdd(id) {
  editId = id||null;
  selE   = '📦';
  document.getElementById('addTitle').textContent = id?'상품 수정':'새 상품 추가';

  if (id) {
    const it = DB.find(i=>i.id===id);
    if (it) {
      selE = it.emoji||'📦';
      document.getElementById('fName').value  = it.name;
      document.getElementById('fCat').value   = it.cat||'';
      document.getElementById('fUnit').value  = it.unit||'';
      document.getElementById('fQty').value   = it.qty;
      document.getElementById('fMin').value   = it.min||0;
      document.getElementById('fPrice').value = it.price||'';
      document.getElementById('fLoc').value   = it.loc||'';
      document.getElementById('fNote').value  = it.note||'';
    }
  } else {
    ['fName','fCat','fUnit','fQty','fMin','fPrice','fLoc','fNote'].forEach(x=>{ document.getElementById(x).value=''; });
  }
  buildEpick();
  open2('addOv');
  setTimeout(()=>document.getElementById('fName').focus(), 320);
}

function buildEpick() {
  document.getElementById('epick').innerHTML = EMOJIS.map(e=>
    `<div class="eopt${e===selE?' on':''}" ontouchend="pickE('${e}');event.preventDefault()" onclick="pickE('${e}')">${e}</div>`
  ).join('');
}
function pickE(e) { selE=e; buildEpick(); }

function saveItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('상품명을 입력해주세요'); return; }
  const data = {
    emoji:selE, name,
    cat:  document.getElementById('fCat').value.trim(),
    unit: document.getElementById('fUnit').value.trim()||'개',
    qty:  parseInt(document.getElementById('fQty').value)||0,
    min:  parseInt(document.getElementById('fMin').value)||0,
    price:parseInt(document.getElementById('fPrice').value)||0,
    loc:  document.getElementById('fLoc').value.trim(),
    note: document.getElementById('fNote').value.trim(),
    upd:  Date.now(),
  };
  if (editId) {
    const idx = DB.findIndex(i=>i.id===editId);
    if (idx!==-1) DB[idx]={...DB[idx],...data};
    toast('✅ 수정되었습니다');
  } else {
    DB.push({id:uid(), hist:[], crt:Date.now(), ...data});
    toast('✅ 추가되었습니다');
  }
  persist(); close2('addOv'); render();
}

/* ════════════════════════════════════════════
   DETAIL MODAL
════════════════════════════════════════════ */
let curDetId = null;

function openDet(id) {
  curDetId=id; dTab='all';
  renderDet(id);
  open2('detOv');
}

function renderDet(id) {
  const it = DB.find(i=>i.id===id);
  if (!it) return;
  const sc  = it.qty<=0?'c-red': it.qty<=(it.min||0)?'c-orange':'c-green';
  const hist= it.hist||[];

  // 필터
  const fil = dTab==='in' ? hist.filter(h=>h.d>0)
            : dTab==='out'? hist.filter(h=>h.d<0)
            : hist;

  // 날짜 그룹
  const groups={};
  fil.forEach(h=>{
    const k=fDate(h.ts);
    if (!groups[k]) groups[k]={lbl:fLabel(h.ts), rows:[]};
    groups[k].rows.push(h);
  });

  const totalIn  = hist.filter(h=>h.d>0).reduce((s,h)=>s+h.d, 0);
  const totalOut = hist.filter(h=>h.d<0).reduce((s,h)=>s+Math.abs(h.d), 0);

  const histHTML = Object.values(groups).length===0
    ? `<div class="hempty">기록이 없습니다</div>`
    : Object.values(groups).map(g=>`
        <div class="hgrp">
          <div class="hdate">${g.lbl}</div>
          ${g.rows.map(h=>`
            <div class="hrow">
              <div class="hico ${h.d>0?'pos':'neg'}">${h.d>0?'▲':'▼'}</div>
              <div class="hmain">
                <div class="hdelta ${h.d>0?'pos':'neg'}">${h.d>0?'+':''}${h.d} ${it.unit||'개'}</div>
                <div class="hsub">재고 ${h.r}${it.unit||'개'}${h.m?' · '+h.m:''}</div>
              </div>
              <div class="htime">${fTime(h.ts)}</div>
            </div>`).join('')}
        </div>`).join('');

  document.getElementById('detSheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="dh">
      <div class="dh-ico">${it.emoji||'📦'}</div>
      <div>
        <div class="dh-name">${it.name}</div>
        <div class="dh-cat">${it.cat||'미분류'}${it.loc?' · '+it.loc:''}</div>
      </div>
    </div>

    <div class="dqc">
      <div>
        <div class="dq-lbl">현재 재고</div>
        <div class="dq-num ${sc}">${it.qty}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${it.unit||'개'} · 최소 ${it.min||0}${it.unit||'개'}</div>
      </div>
      <div class="dq-ctrl">
        <button class="dqbtn p" onclick="adjDet('${id}',1)">＋</button>
        <button class="dqbtn m" onclick="adjDet('${id}',-1)">−</button>
      </div>
    </div>

    <div class="dmg">
      <div class="dmi"><div class="dmi-lbl">단가</div><div class="dmi-val">${it.price?'₩'+fN(it.price):'—'}</div></div>
      <div class="dmi"><div class="dmi-lbl">재고 총액</div><div class="dmi-val" style="color:var(--accent)">${it.price?'₩'+fN(it.qty*it.price):'—'}</div></div>
      <div class="dmi"><div class="dmi-lbl">최근 변경</div><div class="dmi-val" style="font-size:13px">${it.upd?tAgo(it.upd):'—'}</div></div>
      <div class="dmi"><div class="dmi-lbl">메모</div><div class="dmi-val" style="font-size:13px">${it.note||'—'}</div></div>
    </div>

    <div class="hsum">
      <div class="hsc"><div class="hsc-lbl">총 입고</div><div class="hsc-val" style="color:var(--accent)">+${totalIn}</div></div>
      <div class="hsc"><div class="hsc-lbl">총 출고</div><div class="hsc-val" style="color:var(--danger)">-${totalOut}</div></div>
      <div class="hsc"><div class="hsc-lbl">기록 건수</div><div class="hsc-val">${hist.length}</div></div>
    </div>

    <div class="htabs">
      <div class="htab ${dTab==='all'?'on':''}"     onclick="setDTab('${id}','all')">전체 이력</div>
      <div class="htab hin ${dTab==='in'?'on':''}"  onclick="setDTab('${id}','in')">📈 입고</div>
      <div class="htab hout ${dTab==='out'?'on':''}" onclick="setDTab('${id}','out')">📉 출고</div>
    </div>
    <div>${histHTML}</div>

    <div class="brow" style="margin-top:20px">
      <button class="btn btn-del" onclick="delItem('${id}')">삭제</button>
      <button class="btn btn-sec" onclick="close2('detOv');openAdd('${id}')">수정</button>
      <button class="btn btn-ok"  onclick="close2('detOv')">닫기</button>
    </div>`;
}

function adjDet(id, delta) { adj(id,delta); renderDet(id); }
function setDTab(id, t) { dTab=t; renderDet(id); }

function delItem(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  DB = DB.filter(i=>i.id!==id);
  persist(); close2('detOv'); render();
  toast('🗑️ 삭제되었습니다');
}

/* ════════════════════════════════════════════
   SORT MODAL
════════════════════════════════════════════ */
function openSort() {
  const opts=[{k:'name',l:'이름순'},{k:'qty_asc',l:'수량 적은 순'},{k:'qty_desc',l:'수량 많은 순'},{k:'updated',l:'최근 수정순'}];
  document.getElementById('sortBody').innerHTML = opts.map(o=>`
    <div class="sopt ${order===o.k?'on':''}" onclick="setOrder('${o.k}')">
      ${o.l} ${order===o.k?'<span>✓</span>':''}
    </div>`).join('');
  open2('sortOv');
}
function setOrder(k) { order=k; close2('sortOv'); render(); }

/* ════════════════════════════════════════════
   CSV EXPORT
════════════════════════════════════════════ */
function doExport() {
  const rows=[['상품명','카테고리','수량','단위','최소수량','단가','위치','메모'],
    ...DB.map(i=>[i.name,i.cat||'',i.qty,i.unit||'개',i.min||0,i.price||0,i.loc||'',i.note||''])];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download=`재고관리_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('📥 CSV 내보내기 완료');
}

/* ════════════════════════════════════════════
   MODAL HELPERS — display:none 방식으로 완전 교체
════════════════════════════════════════════ */
function open2(id)  { document.getElementById(id).classList.add('open'); }
function close2(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target===document.getElementById(id)) close2(id); }

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
let toastT;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ════════════════════════════════════════════
   INIT — 완전히 새로 설치한 경우에만 샘플 데이터
   (localStorage에 아무 데이터도 없을 때만 실행)
════════════════════════════════════════════ */
if (!localStorage.getItem(STORE_KEY)) {
  const n=Date.now(), d1=n-172800000, d2=n-86400000, d3=n-10800000;
  DB = [
    {id:uid(),emoji:'☕',name:'원두 (에티오피아)',cat:'식재료',unit:'kg',qty:3,min:2,price:25000,loc:'창고 A',note:'',upd:n,crt:n,
     hist:[{d:5,r:5,ts:d1,m:'초도 입고'},{d:-1,r:4,ts:d2,m:''},{d:-1,r:3,ts:d3,m:''}]},
    {id:uid(),emoji:'🥛',name:'우유',cat:'식재료',unit:'L',qty:8,min:5,price:2200,loc:'냉장고',note:'',upd:d2,crt:d2,
     hist:[{d:10,r:10,ts:d1,m:'납품 입고'},{d:-2,r:8,ts:d2,m:''}]},
    {id:uid(),emoji:'🧴',name:'세정제',cat:'소모품',unit:'개',qty:2,min:3,price:4500,loc:'청소함',note:'재주문 필요',upd:d3,crt:d3,
     hist:[{d:5,r:5,ts:d1,m:''},{d:-3,r:2,ts:d3,m:'소비'}]},
    {id:uid(),emoji:'📦',name:'테이크아웃 컵 (L)',cat:'포장재',unit:'개',qty:0,min:50,price:150,loc:'창고 B',note:'',upd:d2,crt:d2,
     hist:[{d:100,r:100,ts:d1,m:'입고'},{d:-100,r:0,ts:d2,m:'소진'}]},
    {id:uid(),emoji:'🍰',name:'시럽 (바닐라)',cat:'식재료',unit:'병',qty:5,min:2,price:8000,loc:'선반',note:'',upd:n,crt:n,
     hist:[{d:6,r:6,ts:d1,m:''},{d:-1,r:5,ts:n,m:''}]},
  ];
  persist();
}

render();
</script>
